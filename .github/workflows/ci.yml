name: CI CD Docker Compose

on:
  push:
    branches:
      - main

jobs:
  build-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: test15b

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Compilar proyecto
        run: mvn clean package -DskipTests

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Construir imagen Docker backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend-spring2:latest .

      - name: Publicar imagen backend en Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/backend-spring2:latest

      - name: Verificar Jar generado
        run: ls -la target

  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Construir imagen Docker frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/test15b-frontend:latest ./frontend_test

      - name: Publicar imagen frontend en Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/test15b-frontend:latest

  deploy:
    needs:
      - build-backend
      - build-frontend
    runs-on: self-hosted

    steps:
      - name: Actualizar contenedores backend y frontend
        run: |
          cd C:\Users\itsva\OneDrive\Documentos\proyecto_docker_compose_limpio\proyecto_docker_compose_limpio
          $env:DOCKER_USERNAME = "${{ secrets.DOCKER_USERNAME }}"
          docker compose pull backend frontend
          docker compose up -d