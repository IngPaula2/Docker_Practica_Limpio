name: CI Spring Boot Docker

on:
  push:
    branches:
      - main

jobs:
  build-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: test15b

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Compilar proyecto
        run: mvn clean package -DskipTests

      - name: Login Docker  Hub
        uses: docker/login-action@v3 
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Construir imagen Docker
        run: docker build -t paulapachon22/test15b-backend:latest .

      - name: Publicar imagen en Docker Hub
        run: docker push paulapachon22/test15b-backend:latest

      - name: Verificar Jar generado
        run: ls -la target
  deploy-backend:
   needs: build-backend
   runs-on: self-hosted
   steps:
    - name:  Actualizar Contenedor Backend
      run: |
        cd C:\Users\itsva\OneDrive\Documentos\proyecto_docker_compose_limpio\proyecto_docker_compose_limpio
        docker compose pull backend
        docker compose up -d backend
      

  